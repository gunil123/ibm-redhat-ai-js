<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS시험 4</title>
</head>
<body>
    <p>
        var은 재선언, 재할당이 가능하고, 스코프 범위가 함수 단위이다.
        undefined로 초기화되는 호이스팅 방식 때문에 예기치 않은 버그를 만들 가능성이 높다.

        let은 재선언은 가능하지만, 재할당이 불가능하다.

        const는 재선언과 재할당 둘 다 불가능하다.
        let과 const는 블록 스코프를 따르며, 선언 전에 변수에 접근하면 오류를 발생시킨다.
    </p>
</body>
</html>
